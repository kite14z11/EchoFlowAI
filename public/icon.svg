<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#grad)"/>

  <!-- Mic capsule -->
  <rect x="196" y="88" width="120" height="200" rx="60" fill="white"/>

  <!-- Mic holder arc -->
  <path d="M 148 264 C 148 370 256 392 256 392 C 256 392 364 370 364 264"
        fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pole -->
  <line x1="256" y1="392" x2="256" y2="444" stroke="white" stroke-width="28" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="186" y1="444" x2="326" y2="444" stroke="white" stroke-width="28" stroke-linecap="round"/>

  <!-- Right wave 1 -->
  <path d="M 376 200 C 408 218 408 270 376 288"
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.75"/>

  <!-- Right wave 2 -->
  <path d="M 408 168 C 460 196 460 282 408 310"
        fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.45"/>

  <!-- Left wave 1 -->
  <path d="M 136 200 C 104 218 104 270 136 288"
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.75"/>

  <!-- Left wave 2 -->
  <path d="M 104 168 C 52 196 52 282 104 310"
        fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.45"/>
</svg>
